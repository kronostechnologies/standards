name: Regenerate ASR Instructions

on:
  push:
    branches:
      - master
    paths:
      - "asr/**"
      - "!asr/ASR-13_ai_features_constraints.md"
      - "!asr/ASR-XX_template.md"
      - "!asr/index.md"
      - "docs/**"
      - "!docs/instructions/**"
      - "prompts/generate-agents-md.md"
      - "bin/generate_agents_md.sh"
      - ".github/workflows/generate-agents-md.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate ASR instructions
        run: make generate.agents
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          branch: dev/update-asr-instructions
          title: "QCTECH-5463 chore: regenerate asr.instructions.md"
          commit-message: "QCTECH-5463 chore: regenerate asr.instructions.md"
          body: |
            Auto-generated update to `docs/instructions/asr.instructions.md` from changes in ASR or docs source files.

            This PR was created by the `generate-agents-md` workflow using GitHub Copilot.
            **Please review the generated content carefully before merging.**
          delete-branch: true
