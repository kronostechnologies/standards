name: Sync External Resources

on:
  push:
    branches:
      - master
    paths:
      - .yarnrc.yml
      - .github/sync/equisoft-actions.yml
      - .github/workflows/sync-external-resources.yml

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: repo-sync
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Sync files to equisoft-actions/*"
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          TEAM_REVIEWERS: equisoft-actions/sre
          CONFIG_PATH: .github/sync/equisoft-actions.yml
          COMMIT_EACH_FILE: false
          GH_PAT: ${{ secrets.EQUISOFT_ACTIONS_PAT }}
          OVERWRITE_EXISTING_PR: true
          PR_LABELS: standards

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: Post workflow status
        uses: equisoft-actions/notify-workflow-status@v2
        with:
          needs: ${{ toJSON(needs) }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.event.repository.custom_properties.ci_slack_channel }}
